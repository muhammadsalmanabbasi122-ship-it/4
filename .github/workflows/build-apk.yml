name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    name: Build APK with EAS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        working-directory: artifacts/mobile
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: eas build --platform android --profile preview --non-interactive --output ./app-release.apk

      - name: Generate APK record on server
        env:
          SERVER_URL: ${{ secrets.SERVER_URL || 'https://chandtricker.qzz.io' }}
        run: |
          RESPONSE=$(curl -s -X POST "$SERVER_URL/apk/generate" \
            -H "Content-Type: application/json" \
            -d "{\"userId\":\"github-ci\",\"url\":\"$SERVER_URL\",\"appName\":\"ChandMod\"}")
          echo "APK_ID=$(echo $RESPONSE | python3 -c 'import sys,json;print(json.load(sys.stdin)[\"id\"])')" >> $GITHUB_ENV

      - name: Upload APK to server
        env:
          SERVER_URL: ${{ secrets.SERVER_URL || 'https://chandtricker.qzz.io' }}
          APK_UPLOAD_KEY: ${{ secrets.APK_UPLOAD_KEY }}
        if: env.APK_UPLOAD_KEY != ''
        run: |
          curl -s -X POST "$SERVER_URL/apk/upload/$APK_ID" \
            -H "Content-Type: application/octet-stream" \
            -H "X-API-Key: $APK_UPLOAD_KEY" \
            --data-binary "@artifacts/mobile/app-release.apk"

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: artifacts/mobile/app-release.apk
